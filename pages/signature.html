<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Assinatura</title>

    <style>
        *{
            margin:0;

            box-sizing:border-box;
        }

        body{
            font-family:Arial;
            background:#f5f5f5;
            display:flex;
            flex-direction:column;
            height:100vh;
        }

        h2{
            text-align:center;
            padding:15px;
        }

        #signature-pad{
            flex:1;
            background:white;

            margin:15px;
            border-radius:10px;
        }

        button{
            margin:15px;
            padding:15px;
            font-size:18px;
            border:none;
            border-radius:10px;
            background:#1976d2;
            color:white;
        }

    </style>

</head>

<body>

<h2>Assine abaixo</h2>

<canvas id="signature-pad"></canvas>

<button>Salvar</button>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@5.0.4/dist/signature_pad.umd.min.js"></script>

<script>

const canvas = document.getElementById("signature-pad");

canvas.width = window.innerWidth - 30;
canvas.height = window.innerHeight - 170;

const signaturePad = new SignaturePad(canvas);

</script>

</body>

</html>
